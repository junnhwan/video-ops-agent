<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <!-- 天线 -->
  <line x1="16" y1="3" x2="16" y2="7" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="2.5" r="1.5" fill="#fff" fill-opacity=".9"/>
  <!-- 头部 -->
  <rect x="6" y="7" width="20" height="16" rx="4" fill="#fff" fill-opacity=".95"/>
  <!-- 左眼 -->
  <circle cx="12" cy="15" r="2.5" fill="url(#g)"/>
  <circle cx="12.8" cy="14.2" r=".8" fill="#fff" fill-opacity=".7"/>
  <!-- 右眼 -->
  <circle cx="20" cy="15" r="2.5" fill="url(#g)"/>
  <circle cx="20.8" cy="14.2" r=".8" fill="#fff" fill-opacity=".7"/>
  <!-- 嘴巴 -->
  <rect x="12" y="19.5" width="8" height="1.5" rx=".75" fill="url(#g)" fill-opacity=".5"/>
  <!-- 身体/脖子 -->
  <rect x="13" y="23" width="6" height="2.5" rx="1" fill="#fff" fill-opacity=".8"/>
  <!-- 底座 -->
  <rect x="8" y="25.5" width="16" height="3" rx="1.5" fill="#fff" fill-opacity=".9"/>
</svg>
