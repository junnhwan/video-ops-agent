services:
  agent:
    build: .
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/app/configs/config.prod.yaml
    volumes:
      - agent-data:/app/data
      - ./configs:/app/configs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  agent-data:
